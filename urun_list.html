<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Altunga Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg-body: #f1f5f9; --sidebar-bg: #ffffff; --card-bg: #ffffff;
            --border-color: #e2e8f0; --text-main: #1e293b; --text-muted: #64748b;
            --primary: #3b82f6; --accent: #10b981; --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); --input-bg: #f8fafc;
        }
        body.dark-mode {
            --bg-body: #0f172a; --sidebar-bg: #1e293b; --card-bg: #1e293b;
            --border-color: #334155; --text-main: #f1f5f9; --text-muted: #94a3b8;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); --input-bg: rgba(0,0,0,0.3);
        }
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; padding: 0; background-color: var(--bg-body); color: var(--text-main); font-family: 'Poppins', sans-serif; height: 100vh; overflow: hidden; transition: 0.3s; }

        /* Login */
        #login-screen { position: fixed; inset: 0; background: var(--bg-body); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .modern-input { width: 100%; padding: 12px; margin: 10px 0; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; font-family: inherit; }
        .modern-btn { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; }

        /* Dashboard Layout */
        .dashboard-container { display: none; height: 100vh; width: 100vw; }
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .brand { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        
        .add-btn { background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px dashed var(--accent); width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 15px; text-align:center; }
        .add-btn:hover { background: var(--accent); color: white; }
        
        .category-list { list-style: none; padding: 0; margin: 0; flex: 1; overflow-y: auto; }
        .cat-btn { width: 100%; padding: 12px 15px; margin-bottom: 5px; background: transparent; border: 1px solid transparent; color: var(--text-muted); border-radius: 8px; cursor: pointer; text-align: left; font-weight: 500; }
        .cat-btn:hover { background: rgba(59, 130, 246, 0.1); color: var(--primary); }
        .cat-btn.active { background: rgba(59, 130, 246, 0.15); color: var(--primary); border-color: rgba(59, 130, 246, 0.3); font-weight: 600; }
        
        .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .theme-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 8px; cursor: pointer; }

        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-input { width: 100%; max-width: 400px; padding: 12px 15px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-main); }

        /* --- KART YAPISI (DÜZELTİLDİ) --- */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 20px; 
            padding-bottom: 50px; 
        }
        
        .product-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; /* Elemanlar arası boşluk */
            box-shadow: var(--shadow);
            height: 100%;
        }

        .p-header { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
        }
        
        .p-img { 
            width: 60px; 
            height: 60px; 
            object-fit: contain; 
            background: var(--input-bg); 
            border-radius: 10px; 
            padding: 5px; 
            flex-shrink: 0;
        }
        
        .p-info { 
            flex: 1; 
            overflow: hidden; 
        }
        .p-info h4 { margin: 0 0 5px 0; font-size: 0.95rem; color: var(--text-main); }
        .p-info span { font-size: 0.8rem; color: var(--text-muted); display: block; }

        .p-footer { 
            margin-top: auto; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        
        /* Fiyat Alanı */
        .price-wrap { 
            display: flex; align-items: center; background: var(--input-bg); 
            padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border-color);
        }
        .price-inp { 
            background: transparent; border: none; color: var(--accent); 
            font-weight: 700; width: 50px; text-align: center; font-size: 1rem; 
        }

        /* Butonlar Grubu */
        .action-btns { 
            display: flex; 
            gap: 8px; 
        }
        
        .icon-btn { 
            width: 36px; height: 36px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            background: var(--card-bg); font-size: 1.1rem;
            transition: 0.2s;
        }
        
        /* Popüler Butonu */
        .btn-pop { color: #94a3b8; }
        .btn-pop.active { background: #fee2e2; color: #ef4444; border-color: #ef4444; }
        .btn-pop:hover { background: #f1f5f9; }

        /* Sil Butonu */
        .btn-del { color: var(--danger); }
        .btn-del:hover { background: #fee2e2; border-color: var(--danger); }

        /* Kaydet Butonu - Simgeye Dönüştürüldü */
        .btn-save { 
            background: var(--primary); color: white; border: none;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; font-size: 1.1rem;
            transition: 0.2s;
        }
        .btn-save:hover { opacity: 0.9; transform: scale(1.05); }
        .btn-save svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* Kategori Kontrolleri */
        .cat-item-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding-right: 5px; }
        .cat-controls { display: flex; align-items: center; gap: 4px; opacity: 0.6; transition: 0.3s; }
        .cat-item-wrap:hover .cat-controls { opacity: 1; }
        .order-btn-sm { 
            background: none; border: none; cursor: pointer; 
            font-size: 0.7rem; color: var(--text-muted); 
            padding: 2px; transition: 0.2s;
        }
        .order-btn-sm:hover { color: var(--primary); transform: translateY(-1px); }
        .order-btn-sm.down:hover { transform: translateY(1px); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-box { background: var(--card-bg); width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; border: 1px solid var(--border-color); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--text-muted); }

        @media (max-width: 768px) {
            .dashboard-container { flex-direction: column; }
            .sidebar { width: 100%; padding: 10px; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            .brand, .sidebar-footer { display: none; }
            .category-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
            .cat-btn { white-space: nowrap; width: auto; }
            .add-btn { width: auto; margin: 0; padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Yönetici Girişi</h2>
            <input type="email" id="email" class="modern-input" placeholder="E-Posta" value="kasiyer@altunga.com">
            <input type="password" id="password" class="modern-input" placeholder="Şifre">
            <button class="modern-btn" onclick="login()">Giriş Yap</button>
            <p id="loginMsg" style="color: var(--danger); font-size: 0.8rem; margin-top:10px;"></p>
        </div>
    </div>

    <div id="addModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitleText" style="margin-top:0; color:var(--text-main)">Yeni Ürün Ekle</h3>
            <div class="form-group"><label class="form-label">Kategori</label><select id="newCatSelect" class="modern-input" onchange="checkNewCategory(this)"></select><input type="text" id="newCatInput" class="modern-input" placeholder="Yeni Kategori" style="display:none; margin-top:5px; border-color:var(--accent);"></div>
            <div class="form-group"><label class="form-label">Grup</label><input type="text" id="newGroup" class="modern-input" placeholder="Örn: Gazlı İçecekler"></div>
            <div class="form-group"><label class="form-label">Ürün Adı</label><input type="text" id="newName" class="modern-input" placeholder="Örn: Yeni Cola"></div>
            <div class="form-group"><label class="form-label">Fiyat</label><input type="number" id="newPrice" class="modern-input" placeholder="0"></div>
            <div class="form-group"><label class="form-label">Resim URL</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="newImg" class="modern-input" placeholder="https://..." style="flex: 1;">
                    <button class="modern-btn" onclick="findImage(this)" style="width: auto; background: var(--primary); padding: 0 15px;">🔍 Bul</button>
                </div>
            </div>
            <div class="form-group" style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="document.getElementById('newPop').click()">
                <input type="checkbox" id="newPop" style="transform:scale(1.5);">
                <label class="form-label" style="margin:0; cursor:pointer;">🔥 Popüler (Vitrine Ekle)</label>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="modern-btn" onclick="saveNewProduct()" style="background: var(--accent);">Kaydet</button>
                <button class="modern-btn" onclick="closeModal()" style="background: var(--text-muted);">İptal</button>
            </div>
        </div>
    </div>

    <!-- Kategori Düzenleme Modalı -->
    <div id="catModal" class="modal-overlay">
        <div class="modal-box" style="max-width: 400px;">
            <h3 id="catModalTitle" style="margin-top:0; color:var(--text-main)">Kategoriyi Düzenle</h3>
            <div class="form-group">
                <label class="form-label">Kategori İsmi</label>
                <input type="text" id="catNameInput" class="modern-input" placeholder="Örn: İçecekler">
            </div>
            <div class="form-group">
                <label class="form-label">İkon / Emoji / Görsel URL</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="catIconInput" class="modern-input" placeholder="Örn: 🥤 veya URL" style="flex: 1;">
                    <button class="modern-btn" onclick="findCatIcon(this)" style="width: auto; background: var(--primary); padding: 0 15px;">🔍 Bul</button>
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="modern-btn" onclick="closeCatModal()" style="background: #e2e8f0; color: var(--text-main);">Vazgeç</button>
                <button class="modern-btn" onclick="saveCategorySettings()" style="flex: 1; background: var(--accent);">Değişiklikleri Kaydet</button>
            </div>
        </div>
    </div>


    <div class="dashboard-container" id="dashboard">
        <aside class="sidebar">
            <div class="brand">🎛️ Altunga Panel</div>
            <button class="add-btn" onclick="openModal()">+ Yeni Ürün</button>
            <ul class="category-list" id="categoryList"></ul>
            <div class="sidebar-footer">
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Karanlık Mod</button>
                <button onclick="logout()" style="background:transparent; border:1px solid var(--danger); color:var(--danger); padding:10px; border-radius:8px; cursor:pointer;">Çıkış Yap</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <input type="text" class="search-input" id="search" placeholder="Ürün ara..." onkeyup="searchProduct()">
                <div id="itemCount" style="color: var(--text-muted); font-size: 0.9rem;"></div>
            </div>
            <div id="loading" style="text-align:center; margin-top:50px; color:var(--text-muted);">Yükleniyor...</div>
            <div class="product-grid" id="productGrid"></div>
        </main>
    </div>

                document.getElementById('login-screen').style.display = 'none';

                document.getElementById('dashboard').style.display = 'none';
            }
        });

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            auth.signInWithEmailAndPassword(email, pass)
                .catch(() => document.getElementById('loginMsg').innerText = "Hatalı Giriş! (Yerel için 1234 deneyin)");
        }
        function logout() { 
            sessionStorage.removeItem('altunga_local_admin');
            auth.signOut(); 
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeBtn').innerHTML = "☀️ Aydınlık Mod";
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeBtn').innerHTML = isDark ? "☀️ Aydınlık Mod" : "🌙 Karanlık Mod";
        }

        async function fetchData() {
            document.getElementById('loading').style.display = 'block';
            
            // Önce kategori ayarlarını çekelim
            const catSnap = await db.collection("category_settings").get();
            catSettings = {};
            catSnap.forEach(doc => { catSettings[doc.id] = doc.data(); });

            const snapshot = await db.collection("menu_items").orderBy("category").get();
            allProducts = [];
            categories = new Set();
            
            snapshot.forEach(doc => {
                const data = doc.data();
                allProducts.push({ id: doc.id, ...data });
                categories.add(data.category);
            });

            renderSidebar();
            renderCategorySelect(); // Kategori listesini select kutusuna doldur
            renderProducts(currentCategory);
            document.getElementById('loading').style.display = 'none';
        }

        function renderCategorySelect() {
            const select = document.getElementById('newCatSelect');
            let html = `<option value="">Kategori Seçin...</option>`;
            [...categories].sort().forEach(cat => {
                html += `<option value="${cat}">${cat}</option>`;
            });
            html += `<option value="YENİ">+ Yeni Kategori Ekle...</option>`;
            select.innerHTML = html;
        }

        function renderSidebar() {
            const list = document.getElementById('categoryList');
            list.innerHTML = `<button class="cat-btn ${currentCategory === 'Tümü' ? 'active' : ''}" onclick="filterCat('Tümü', this)">🏠 Tümü</button>`;
            
            // Kategorileri sıraya göre diz
            const sortedCats = [...categories].sort((a, b) => {
                const orderA = (catSettings[a] && catSettings[a].order) || 999;
                const orderB = (catSettings[b] && catSettings[b].order) || 999;
                return orderA - orderB;
            });

            sortedCats.forEach((cat, index) => {
                const setting = catSettings[cat] || {};
                const icon = setting.icon || "📦";
                list.innerHTML += `
                    <div class="cat-item-wrap">
                        <button class="cat-btn ${currentCategory === cat ? 'active' : ''}" onclick="filterCat('${cat}', this)" style="flex:1; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                            ${icon.length < 10 ? icon : '<img src="'+icon+'" style="width:18px;height:18px;object-fit:contain;">'} ${cat}
                        </button>
                        <div class="cat-controls">
                            <button class="order-btn-sm" onclick="moveCategory('${cat}', -1)" title="Yukarı">▲</button>
                            <button class="order-btn-sm down" onclick="moveCategory('${cat}', 1)" title="Aşağı">▼</button>
                            <button class="icon-btn" onclick="openCatModal('${cat}')" style="width:28px; height:28px; font-size:0.75rem; border:none;" title="Düzenle">✏️</button>
                        </div>
                    </div>`;
            });
        }

        async function moveCategory(catName, direction) {
            const sortedCats = [...categories].sort((a, b) => {
                const orderA = (catSettings[a] && catSettings[a].order) || 999;
                const orderB = (catSettings[b] && catSettings[b].order) || 999;
                return orderA - orderB;
            });

            const index = sortedCats.indexOf(catName);
            const targetIndex = index + direction;

            if (targetIndex < 0 || targetIndex >= sortedCats.length) return;

            const targetCat = sortedCats[targetIndex];
            
            // Yeni sıraları belirle
            const batch = db.batch();
            batch.set(db.collection("category_settings").doc(catName), { order: targetIndex }, { merge: true });
            batch.set(db.collection("category_settings").doc(targetCat), { order: index }, { merge: true });

            await batch.commit();
            fetchData();
        }

        function openCatModal(catName) {
            editingCatName = catName;
            const setting = catSettings[catName] || {};
            document.getElementById('catNameInput').value = catName;
            document.getElementById('catIconInput').value = setting.icon || "";
            document.getElementById('catModal').style.display = 'flex';
        }

        function closeCatModal() {
            document.getElementById('catModal').style.display = 'none';
            editingCatName = null;
        }

        function findCatIcon(btn) {
            const name = document.getElementById('catNameInput').value.trim();
            if(!name) return alert("Önce kategori adını yazmalısınız!");
            
            const oldText = btn.innerText;
            btn.innerText = "⏳";
            
            // Kategori için de otomatik görsel tahmini
            const autoUrl = `https://source.unsplash.com/featured/?${encodeURIComponent(name + ' icon')}`;
            document.getElementById('catIconInput').value = autoUrl;
            
            window.open(`https://www.google.com/search?q=${encodeURIComponent(name + ' icon emoji')}&tbm=isch`, '_blank');
            setTimeout(() => { btn.innerText = oldText; }, 1000);
        }

        async function saveCategorySettings() {
            const newName = document.getElementById('catNameInput').value.trim();
            const newIcon = document.getElementById('catIconInput').value.trim();
            const oldName = editingCatName;

            if(!newName) return alert("İsim boş olamaz!");

            const btn = event.target;
            btn.innerText = "Kaydediliyor...";
            btn.disabled = true;

            try {
                // 1. Kategori Ayarlarını Güncelle (Firestore ID olarak kategori ismini kullanıyoruz)
                await db.collection("category_settings").doc(newName).set({ icon: newIcon });
                if (oldName !== newName && oldName) await db.collection("category_settings").doc(oldName).delete();

                // 2. Eğer isim değiştiyse tüm ürünleri güncelle
                if (oldName && oldName !== newName) {
                    const productsToUpdate = allProducts.filter(p => p.category === oldName);
                    const batch = db.batch();
                    productsToUpdate.forEach(p => {
                        batch.update(db.collection("menu_items").doc(p.id), { category: newName });
                    });
                    await batch.commit();
                }

                alert("✅ Kategori başarıyla güncellendi!");
                closeCatModal();
                fetchData();
            } catch (e) {
                alert("Hata: " + e.message);
            } finally {
                btn.innerText = "Değişiklikleri Kaydet";
                btn.disabled = false;
            }
        }

        function filterCat(catName, btnElement) {
            currentCategory = catName;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            renderProducts(catName);
        }

        function renderProducts(filter) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            let filteredList = allProducts;
            
            if (filter !== "Tümü") filteredList = allProducts.filter(p => p.category === filter);
            
            const searchVal = document.getElementById('search').value.toLowerCase();
            if(searchVal) filteredList = filteredList.filter(p => p.name_tr.toLowerCase().includes(searchVal));

            document.getElementById('itemCount').innerText = `${filteredList.length} ürün gösteriliyor`;

            filteredList.forEach(p => {
                // Görsel: Önce DB, sonra Harita, sonra Kategori, en son Logo
                let imgSrc = p.image;
                if (!imgSrc || imgSrc === 'default.png' || imgSrc === '') {
                    imgSrc = exactImageMap[p.name_tr] || catImages[p.category.trim()] || 'logo.png';
                }

                // Butonun rengi: Popülerse kırmızı (active), değilse gri
                const popClass = p.isPopular ? 'active' : '';
                const popIcon = p.isPopular ? '🔥' : '☁️';

                grid.innerHTML += `
                    <div class="product-card">
                        <div class="p-header">
                            <img src="${imgSrc}" class="p-img" onerror="this.src='logo.png'">
                            <div class="p-info">
                                <h4>${p.name_tr}</h4>
                                <span>${p.group}</span>
                            </div>
                        </div>
                        <div class="p-footer">
                            <div class="price-wrap">
                                <span style="font-size:0.8rem; color:var(--text-muted)">₺</span>
                                <input type="number" class="price-inp" id="price-${p.id}" value="${p.price}">
                            </div>
                            <div class="action-btns">
                                <button class="icon-btn btn-pop ${popClass}" onclick="togglePopular('${p.id}', ${!p.isPopular})" title="Vitrine Ekle/Çıkar">${popIcon}</button>
                                <button class="icon-btn" onclick="editProduct('${p.id}')" title="Düzenle">✏️</button>
                                <button class="icon-btn btn-del" onclick="deleteProduct('${p.id}')" title="Sil">🗑️</button>
                                <button class="btn-save" id="btn-save-${p.id}" onclick="updatePrice('${p.id}')" title="Kaydet">
                                    <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function updatePrice(id) {
            const val = parseFloat(document.getElementById(`price-${id}`).value);
            const btn = document.getElementById(`btn-save-${id}`);
            const oldHtml = btn.innerHTML;
            btn.innerHTML = "⏳";
            db.collection("menu_items").doc(id).update({ price: val })
                .then(() => { btn.innerHTML = "✓"; setTimeout(() => { btn.innerHTML = oldHtml; }, 1000); });
        }

        // --- POPÜLERLİK DEĞİŞTİRME ---
        function togglePopular(id, newStatus) {
            // Animasyon veya bekleme ikonu koyabiliriz ama basitlik için direkt güncelleyelim
            db.collection("menu_items").doc(id).update({ isPopular: newStatus })
                .then(() => {
                    // Listeyi yenilemeden sadece butonu güncellemek daha hızlı olur ama
                    // array'i de güncellememiz lazım. En temiz yol yeniden fetch.
                    fetchData();
                })
                .catch(err => alert("Hata: " + err));
        }

        function deleteProduct(id) {
            if(confirm("Bu ürünü kalıcı olarak silmek istediğinize emin misiniz?")) {
                db.collection("menu_items").doc(id).delete()
                    .then(() => { alert("Ürün silindi."); fetchData(); })
                    .catch(err => alert("Hata: " + err));
            }
        }

        function searchProduct() { renderProducts(currentCategory); }

        function openModal() {
            const select = document.getElementById('newCatSelect');
            select.innerHTML = '<option value="">Seçiniz...</option>';
            categories.forEach(cat => {
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
            select.innerHTML += '<option value="new">+ Yeni Kategori Oluştur</option>';
            document.getElementById('addModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('addModal').style.display = 'none';
            editingId = null;
            document.getElementById('modalTitleText').innerText = "Yeni Ürün Ekle";
            document.getElementById('newCatSelect').value = "";
            document.getElementById('newCatInput').style.display = "none";
            document.getElementById('newCatInput').value = "";
            document.getElementById('newGroup').value = "";
            document.getElementById('newName').value = "";
            document.getElementById('newPrice').value = "";
            document.getElementById('newImg').value = "";
            document.getElementById('newPop').checked = false;
        }

        function editProduct(id) {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;
            editingId = id;

            // Kategori listesini doldur
            const select = document.getElementById('newCatSelect');
            select.innerHTML = '<option value="">Seçiniz...</option>';
            categories.forEach(cat => {
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
            select.innerHTML += '<option value="new">+ Yeni Kategori Oluştur</option>';

            document.getElementById('modalTitleText').innerText = "Ürünü Düzenle";
            document.getElementById('newCatSelect').value = p.category;
            document.getElementById('newGroup').value = p.group;
            document.getElementById('newName').value = p.name_tr;
            document.getElementById('newPrice').value = p.price;
            document.getElementById('newImg').value = p.image || "";
            document.getElementById('newPop').checked = p.isPopular || false;
            document.getElementById('addModal').style.display = 'flex';
        }

        async function findImage(btn) {
            const name = document.getElementById('newName').value.trim();
            if(!name) return alert("Önce ürün adını yazmalısınız!");
            
            const oldText = btn.innerText;
            btn.innerText = "⏳";
            
            // Otomatik Görsel URL'si Oluşturma
            const autoUrl = `https://source.unsplash.com/featured/?${encodeURIComponent(name + ' product')}`;
            document.getElementById('newImg').value = autoUrl;
            
            window.open(`https://www.google.com/search?q=${encodeURIComponent(name + ' food product png')}&tbm=isch`, '_blank');
            
            setTimeout(() => { btn.innerText = oldText; }, 1000);
        }

        function checkNewCategory(elem) {
            const input = document.getElementById('newCatInput');
            if (elem.value === 'new') {
                input.style.display = 'block';
                input.focus();
            } else {
                input.style.display = 'none';
            }
        }

        function saveNewProduct() {
            const selectVal = document.getElementById('newCatSelect').value;
            let category = selectVal;
            if (selectVal === 'new') category = document.getElementById('newCatInput').value.trim();

            const group = document.getElementById('newGroup').value.trim();
            const name = document.getElementById('newName').value.trim();
            const price = parseFloat(document.getElementById('newPrice').value);
            const img = document.getElementById('newImg').value.trim();
            const isPop = document.getElementById('newPop').checked;

            if (!category || !group || !name || isNaN(price)) {
                alert("Lütfen tüm zorunlu alanları doldurun!");
                return;
            }

            const btn = event.target;
            btn.innerText = "Kaydediliyor...";
            btn.disabled = true;

            const finalImg = img || 'default.png';
            const data = {
                category: category,
                group: group,
                name_tr: name,
                price: price,
                image: finalImg,
                name_en: name,
                isPopular: isPop
            };

            const task = editingId ? db.collection("menu_items").doc(editingId).update(data) : db.collection("menu_items").add(data);

            task.then(() => {
                alert(editingId ? "✅ Ürün güncellendi!" : "✅ Ürün başarıyla eklendi!");
                closeModal();
                fetchData(); 
                btn.innerText = "Kaydet";
                btn.disabled = false;
            }).catch((error) => {
                console.error("Hata:", error);
                alert("Hata oluştu: " + error.message);
                btn.innerText = "Kaydet";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
